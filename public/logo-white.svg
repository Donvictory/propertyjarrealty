<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 110" fill="none">
  <!-- Building silhouettes (white/light) -->
  <rect x="12" y="8" width="14" height="58" fill="white" rx="1" opacity="0.9"/>
  <rect x="30" y="22" width="10" height="44" fill="white" rx="1" opacity="0.9"/>
  <rect x="44" y="16" width="8" height="50" fill="#ffcccc" rx="1" opacity="0.9"/>

  <!-- House roof (white/silver) -->
  <polyline points="10,68 56,32 102,68" stroke="white" stroke-width="6" stroke-linejoin="round" fill="none" stroke-linecap="round"/>
  <rect x="52" y="48" width="8" height="8" fill="white" rx="1"/>

  <!-- Red separator line -->
  <line x1="10" y1="100" x2="210" y2="100" stroke="#ff6680" stroke-width="2.5"/>

  <!-- PROPERTYJAR text -->
  <text x="118" y="75" font-family="'League Spartan', 'Arial Black', Arial, sans-serif" font-size="32" font-weight="900" letter-spacing="1" fill="white">PROPERTYJAR</text>
  <!-- REALTY LTD text -->
  <text x="145" y="96" font-family="'League Spartan', 'Arial', sans-serif" font-size="14" font-weight="600" letter-spacing="5" fill="rgba(255,255,255,0.7)">REALTY LTD</text>
</svg>
